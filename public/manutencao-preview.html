<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTICEG · Em Manutenção</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D0D0D; color: #F5F0E8; font-family: 'DM Mono', monospace; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .wrap { text-align: center; max-width: 480px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
  .logo span { color: #FF5C1A; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 8vw, 80px); line-height: 1; }
  .sub { font-size: 13px; color: rgba(245,240,232,.5); line-height: 1.6; }
  .btn { display: inline-flex; align-items: center; gap: 8px; background: #FF5C1A; color: #0D0D0D; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; padding: 14px 28px; border-radius: 6px; text-decoration: none; letter-spacing: 1px; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .footer { font-size: 10px; color: rgba(245,240,232,.2); letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">ANTI<span>CEG</span></div>
    <div class="title">EM MANUTENÇÃO</div>
    <div class="sub">Estamos atualizando os pagamentos e a base de dados. Voltaremos às 19h!</div>
    <div class="footer">anticeg · masterlist</div>
  </div>
</body>
</html>
